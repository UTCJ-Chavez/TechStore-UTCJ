<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TechStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>TechStore</h1>
    <nav>
        <button class="btn active" data-filter="all">Mostrar todos</button>
        <button class="btn" data-filter="celulares">Celulares</button>
        <button class="btn" data-filter="laptops">Laptops</button>
        <button class="btn" data-filter="accesorios">Accesorios</button>
    </nav>
    <div id="product-list">
        <div class="product" data-category="celulares">iPhone 15</div>
        <div class="product" data-category="laptops">MacBook Pro</div>
        <div class="product" data-category="accesorios">Audífonos</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
